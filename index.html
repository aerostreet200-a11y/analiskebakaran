<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pro Fire Inspection System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
    
    body { font-family: 'Inter', sans-serif; }
    select, input, textarea { font-size: 16px !important; }
    
    .tab-active {
      border-bottom: 4px solid #ffffff;
      color: #ffffff;
      font-weight: 800;
    }

    .card-item {
      transition: all 0.2s ease;
    }

    .card-item:active {
      transform: scale(0.99);
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .category-badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .sticky-container {
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .sticky-category {
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0;
      padding: 0.75rem 1.5rem;
    }

    .loading-spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #fff;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-40">
  <div class="max-w-2xl mx-auto bg-white min-h-screen shadow-xl relative">
    
    <!-- Container Sticky Gabungan -->
    <div class="sticky-container">
      <header class="bg-slate-900 px-6 pt-6 pb-2 text-white shadow-lg">
        <div class="flex justify-between items-center mb-4">
          <div>
            <h1 class="text-base font-extrabold tracking-tight leading-tight uppercase">Inspeksi Proteksi Kebakaran</h1>
            <p class="text-[9px] text-slate-400 font-bold tracking-[0.1em] uppercase">Dinas Damkartan Kab. Merangin</p>
          </div>
        </div>
        
        <nav class="flex gap-6 overflow-x-auto no-scrollbar">
          <button type="button" onclick="switchTab('general')" id="tab-general" class="tab-active pb-2 text-[10px] uppercase whitespace-nowrap">Umum</button>
          <button type="button" onclick="switchTab('items')" id="tab-items" class="pb-2 text-[10px] uppercase whitespace-nowrap opacity-50">Daftar Temuan</button>
        </nav>
      </header>

      <div id="sticky-buttons" class="hidden sticky-category">
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
          <button type="button" onclick="addItem('apar')" class="flex-shrink-0 px-4 py-2.5 bg-red-600 text-white rounded-xl text-[10px] font-black uppercase shadow-sm active:scale-90 transition-transform">+ APAR</button>
          <button type="button" onclick="addItem('hydrant')" class="flex-shrink-0 px-4 py-2.5 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase shadow-sm active:scale-90 transition-transform">+ HYDRANT</button>
          <button type="button" onclick="addItem('alarm')" class="flex-shrink-0 px-4 py-2.5 bg-yellow-500 text-white rounded-xl text-[10px] font-black uppercase shadow-sm active:scale-90 transition-transform">+ ALARM</button>
          <button type="button" onclick="addItem('sprinkler')" class="flex-shrink-0 px-4 py-2.5 bg-green-600 text-white rounded-xl text-[10px] font-black uppercase shadow-sm active:scale-90 transition-transform">+ SPRINKLER</button>
          <button type="button" onclick="addItem('pasif')" class="flex-shrink-0 px-4 py-2.5 bg-purple-600 text-white rounded-xl text-[10px] font-black uppercase shadow-sm active:scale-90 transition-transform">+ PASIF</button>
        </div>
      </div>
    </div>

    <form id="inspectionForm">
      <!-- SECTION: GENERAL INFO -->
      <div id="sec-general" class="p-6 space-y-6">
        <div class="space-y-4">
          <h2 class="text-xs font-black text-slate-800 uppercase flex items-center gap-2">
            <span class="w-1.5 h-4 bg-slate-900 rounded-full"></span>
            Informasi Dasar
          </h2>
          <div class="space-y-4">
            <div>
              <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Gedung / Proyek</label>
              <input type="text" name="building_name" id="building_name" required placeholder="Masukkan nama lokasi" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Tanggal</label>
                <input type="date" name="inspect_date" id="inspect_date" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
              </div>
              <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1">Pemeriksa</label>
                <input type="text" name="inspector_name" id="inspector_name" required placeholder="Nama" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
              </div>
            </div>
          </div>
        </div>

        <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl">
          <h3 class="text-[10px] font-black uppercase mb-4 tracking-widest text-slate-400">Ringkasan Item</h3>
          <div class="grid grid-cols-3 gap-4 text-center">
            <div class="bg-slate-800 p-3 rounded-2xl">
              <div id="stat-total" class="text-xl font-black">0</div>
              <div class="text-[8px] font-bold text-slate-500 uppercase">Total</div>
            </div>
            <div id="stat-active-box" class="bg-slate-800 p-3 rounded-2xl">
              <div id="stat-active" class="text-xl font-black text-blue-400">0</div>
              <div class="text-[8px] font-bold text-slate-500 uppercase">Aktif</div>
            </div>
            <div id="stat-passive-box" class="bg-slate-800 p-3 rounded-2xl">
              <div id="stat-passive" class="text-xl font-black text-purple-400">0</div>
              <div class="text-[8px] font-bold text-slate-500 uppercase">Pasif</div>
            </div>
          </div>
          <button type="button" onclick="switchTab('items')" class="w-full mt-6 py-3 bg-white text-slate-900 rounded-xl font-black text-[10px] uppercase tracking-tighter hover:bg-slate-200 transition">Buka Daftar Temuan &rarr;</button>
        </div>

        <div class="pt-10">
          <button type="submit" id="btnSubmit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-2xl hover:bg-black transition-all active:scale-95 disabled:opacity-50">
            Simpan Laporan ke Sheet
          </button>
        </div>
      </div>

      <!-- SECTION: ITEMS LIST -->
      <div id="sec-items" class="hidden px-6 pt-6 space-y-4">
        <div id="items-list" class="space-y-6 min-h-[500px]">
          <div id="empty-state" class="py-20 text-center space-y-4">
            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tambah temuan untuk memulai</p>
          </div>
        </div>
      </div>
    </form>

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-4 rounded-2xl bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest shadow-2xl text-center min-w-[250px]"></div>
  </div>

  <script>
    // Konfigurasi Google Script URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwD_OQWzvJl8WA9Z0YdlKS3JyqOJjm5TpIscNRu0JxROeegtyCgPQNL0c7_14NAIBVURw/exec';

    let itemCount = 0;
    const floorOptions = `<option value="">Lantai...</option><option>Basement</option><option>Lantai 1</option><option>Lantai 2</option><option>Lantai 3</option><option>Lantai 4</option><option>Atap</option><option>Luar</option>`;

    function switchTab(target) {
      document.getElementById('sec-general').classList.toggle('hidden', target !== 'general');
      document.getElementById('sec-items').classList.toggle('hidden', target !== 'items');
      document.getElementById('tab-general').classList.toggle('tab-active', target === 'general');
      document.getElementById('tab-items').classList.toggle('tab-active', target === 'items');
      document.getElementById('tab-general').classList.toggle('opacity-50', target !== 'general');
      document.getElementById('tab-items').classList.toggle('opacity-50', target !== 'items');
      document.getElementById('sticky-buttons').classList.toggle('hidden', target !== 'items');
      window.scrollTo(0, 0);
    }

    function updateStats() {
      const items = document.querySelectorAll('.card-item');
      itemCount = items.length;
      document.getElementById('stat-total').innerText = itemCount;
      document.getElementById('empty-state').style.display = itemCount > 0 ? 'none' : 'block';
      let active = 0, passive = 0;
      items.forEach(i => {
        if (i.dataset.category === 'pasif') passive++;
        else active++;
      });
      document.getElementById('stat-active').innerText = active;
      document.getElementById('stat-passive').innerText = passive;
    }

    function addItem(type) {
      const list = document.getElementById('items-list');
      const itemId = Date.now().toString();
      const card = document.createElement('div');
      
      const config = {
        apar: { color: 'red', label: 'APAR', icon: 'M13 10V3L4 14h7v7l9-11h-7z' },
        hydrant: { color: 'blue', label: 'HYDRANT', icon: 'M19 16.72V21a1 1 0 01-1 1H6a1 1 0 01-1-1v-4.28a2 2 0 00.1-3.69L7 11V6a5 5 0 0110 0v5l1.9 2.03a2 2 0 00.1 3.69z' },
        alarm: { color: 'yellow', label: 'ALARM', icon: 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9' },
        sprinkler: { color: 'green', label: 'SPRINKLER', icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4' },
        pasif: { color: 'purple', label: 'PASIF', icon: 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z' }
      };

      const c = config[type];
      card.className = `card-item bg-white border border-slate-200 rounded-3xl p-5 shadow-sm space-y-4 relative overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-300`;
      card.dataset.category = type;
      card.dataset.itemId = itemId;
      
      let specificHTML = "";
      
      if (type === 'apar') {
        specificHTML = `
          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Jenis Media</span>
              <select name="media" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Dry Chemical Powder</option><option>CO2</option><option>Foam</option><option>Liquid Gas</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Berat (kg)</span>
              <select name="weight" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>1 kg</option><option>3 kg</option><option>6 kg</option><option>9 kg</option><option>25 kg</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Tekanan</span><select name="cond1" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Normal</option><option>Low</option></select></div>
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Segel</span><select name="cond2" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Utuh</option><option>Putus</option></select></div>
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Selang</span><select name="cond3" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Baik</option><option>Rusak</option></select></div>
          </div>`;
      } 
      else if (type === 'hydrant') {
        specificHTML = `
          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Jenis Unit</span>
              <select name="media" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Indoor (Gedung)</option>
                <option>Outdoor (Pilar)</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Status Tekanan</span>
              <select name="cond1" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Siaga (Standby)</option>
                <option>Tidak Bertekanan</option>
                <option>Bocor</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-4 gap-1.5">
            <div class="space-y-1">
              <span class="text-[8px] font-black text-slate-400 uppercase">Box/Pilar</span>
              <select name="cond2" class="w-full p-1.5 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none">
                <option>Baik</option><option>Rusak</option><option>Hilang</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[8px] font-black text-slate-400 uppercase">Nozzle</span>
              <select name="cond3" class="w-full p-1.5 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none">
                <option>Ada</option><option>Hilang</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[8px] font-black text-slate-400 uppercase">Hose</span>
              <select name="cond4" class="w-full p-1.5 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none">
                <option>Baik</option><option>Bocor</option><option>Hilang</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[8px] font-black text-slate-400 uppercase">Valve</span>
              <select name="cond5" class="w-full p-1.5 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none">
                <option>Normal</option><option>Macet</option>
              </select>
            </div>
          </div>`;
      }
      else if (type === 'alarm') {
        specificHTML = `
          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Item Alarm</span>
              <select name="media" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Master Control (MCFA)</option>
                <option>Manual Call Point</option>
                <option>Heat Detector</option>
                <option>Smoke Detector</option>
                <option>Alarm Bell / Strobe</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Status Sistem</span>
              <select name="cond1" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Normal (Siaga)</option>
                <option>Trouble / Fault</option>
                <option>Disable Zone</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Indikator</span><select name="cond2" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Normal</option><option>Mati</option><option>Error</option></select></div>
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Power</span><select name="cond3" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>AC On</option><option>Low Batt</option></select></div>
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Suara</span><select name="cond4" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Berbunyi</option><option>Mati</option></select></div>
          </div>`;
      }
      else if (type === 'sprinkler') {
        specificHTML = `
          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Jenis Head</span>
              <select name="media" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Pendent</option><option>Upright</option><option>Sidewall</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Suhu</span>
              <select name="weight" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>68°C (Merah)</option><option>79°C (Kuning)</option><option>93°C (Hijau)</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Head</span><select name="cond1" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Bersih</option><option>Rusak</option></select></div>
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Pipa</span><select name="cond2" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Baik</option><option>Bocor</option></select></div>
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Pressure</span><select name="cond3" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Sesuai</option><option>Rendah</option></select></div>
          </div>`;
      }
      else if (type === 'pasif') {
          specificHTML = `
          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Item Pasif</span>
              <select name="media" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Emergency Light</option><option>Exit Sign</option><option>Tangga Darurat</option><option>Akses Pemadam</option>
              </select>
            </div>
            <div class="space-y-1">
              <span class="text-[9px] font-black text-slate-400 uppercase">Kelancaran</span>
              <select name="cond1" class="w-full p-2 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <option>Lancar</option><option>Terhalang</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Kondisi Lampu</span><select name="cond2" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Menyala</option><option>Mati</option></select></div>
            <div class="space-y-1"><span class="text-[9px] font-black text-slate-400 uppercase">Visibilitas</span><select name="cond3" class="w-full p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none"><option>Jelas</option><option>Buram</option></select></div>
          </div>`;
      }

      card.innerHTML = `
        <div class="absolute top-0 left-0 w-1.5 h-full bg-${c.color}-600"></div>
        <div class="flex justify-between items-start">
          <div class="flex items-center gap-3">
            <div class="p-2 bg-${c.color}-100 text-${c.color}-600 rounded-xl">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${c.icon}" />
              </svg>
            </div>
            <div>
              <span class="category-badge bg-${c.color}-100 text-${c.color}-700 uppercase">${c.label}</span>
              <input type="text" name="item_id" placeholder="NOMOR ID / KODE" class="block mt-1 text-sm font-black text-slate-800 bg-transparent outline-none w-full">
            </div>
          </div>
          <button type="button" onclick="this.closest('.card-item').remove(); updateStats();" class="text-slate-300">
             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
          </button>
        </div>
        <div class="grid grid-cols-2 gap-3">
           <select name="floor" class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">${floorOptions}</select>
           <input type="text" name="location" placeholder="Detail Titik Lokasi" class="p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none">
        </div>
        ${specificHTML}
        <textarea name="note" placeholder="Catatan tambahan..." class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs outline-none min-h-[50px]"></textarea>
      `;

      list.insertBefore(card, list.firstChild);
      updateStats();
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.classList.remove('hidden');
      toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-2xl text-center min-w-[250px] ${isError ? 'bg-red-600' : 'bg-slate-900'} text-white`;
      setTimeout(() => toast.classList.add('hidden'), 5000);
    }

    window.onload = () => {
      document.getElementById('inspect_date').value = new Date().toISOString().split('T')[0];
    };

    const form = document.getElementById('inspectionForm');
    form.onsubmit = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      
      // Validasi item minimal
      const itemCards = document.querySelectorAll('.card-item');
      if (itemCards.length === 0) {
        showToast("Tambahkan minimal 1 item temuan!", true);
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<span class="loading-spinner"></span> MENGIRIM DATA...`;

      // Kumpulkan data umum
      const data = {
        building_name: document.getElementById('building_name').value,
        inspect_date: document.getElementById('inspect_date').value,
        inspector_name: document.getElementById('inspector_name').value,
        items: []
      };

      // Kumpulkan data temuan
      itemCards.forEach(card => {
        const item = {
          category: card.dataset.category,
          item_id: card.querySelector('[name="item_id"]').value,
          floor: card.querySelector('[name="floor"]').value,
          location: card.querySelector('[name="location"]').value,
          media: card.querySelector('[name="media"]')?.value || '',
          weight: card.querySelector('[name="weight"]')?.value || '',
          cond1: card.querySelector('[name="cond1"]')?.value || '',
          cond2: card.querySelector('[name="cond2"]')?.value || '',
          cond3: card.querySelector('[name="cond3"]')?.value || '',
          cond4: card.querySelector('[name="cond4"]')?.value || '',
          cond5: card.querySelector('[name="cond5"]')?.value || '',
          note: card.querySelector('[name="note"]').value
        };
        data.items.push(item);
      });

      try {
        // Kirim ke Google Apps Script via POST
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', // Mode no-cors umum untuk Apps Script POST
          cache: 'no-cache',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        // Karena mode no-cors tidak bisa baca response body, kita asumsikan sukses jika tidak throw error
        showToast("LAPORAN BERHASIL TERKIRIM KE SHEET! ✅");
        form.reset();
        document.getElementById('items-list').innerHTML = `<div id="empty-state" class="py-20 text-center space-y-4">...</div>`;
        updateStats();
        window.scrollTo(0, 0);
        switchTab('general');

      } catch (err) {
        console.error(err);
        showToast("GAGAL MENGIRIM DATA. PERIKSA KONEKSI.", true);
      } finally {
        btn.disabled = false;
        btn.innerText = "Simpan Laporan ke Sheet";
      }
    };
  </script>
</body>
</html>
